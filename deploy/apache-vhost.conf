# Apache vhost for standardization.taimaka-internal.org
# ----------------------------------------------------
# Drop into /etc/apache2/sites-available/standardization.conf and enable with:
#   a2enmod proxy proxy_http rewrite headers ssl
#   a2ensite standardization
#   systemctl reload apache2
# Certificates are managed externally with certbot.
#
# The Next.js standalone server listens on 127.0.0.1:3001 (configured via
# the systemd unit). Apache reverse-proxies HTTPS traffic to it.

<VirtualHost *:80>
    ServerName standardization.taimaka-internal.org

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName standardization.taimaka-internal.org

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/taimaka-internal.org/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/taimaka-internal.org/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Forward client info upstream so Next.js sees the real host/proto.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host  "standardization.taimaka-internal.org"
    ProxyPreserveHost On

    # Reverse proxy -> Next.js standalone server.
    ProxyPass        /  http://127.0.0.1:3001/
    ProxyPassReverse /  http://127.0.0.1:3001/

    # WebSocket upgrade (Next dev tools, server actions streaming).
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3001/$1" [P,L]

    # Sensible logs.
    ErrorLog  ${APACHE_LOG_DIR}/standardization-error.log
    CustomLog ${APACHE_LOG_DIR}/standardization-access.log combined

</VirtualHost>
